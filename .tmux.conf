# prefixキーをCtrl+Spaceに変更
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# 設定の再読み込み
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# コピーモードのキー設定
set-window-option -g mode-keys vi
set-option -g default-terminal "screen-256color"

set-option -g mouse on

# ウィンドウ分割（vim準拠: v=左右(:vs), s=上下(:sp)）
# split-window 自体は -h/-v だけで素直に分割（new pane は親 pane の半分を取る）
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# レイアウト均等化（手動）: ツリー構造が混在する場合は適切なプリセットを選んで使う
# = : 全ペインを横一列で等幅 (even-horizontal)
# +  : 全ペインを縦一列で等高 (even-vertical)
# M : 大 pane 上 + 下を横一列 (main-horizontal) — task.yml の 3pane 構造を維持して下段を等分
# m : 大 pane 左 + 右を縦一列 (main-vertical)
bind-key = select-layout even-horizontal
bind-key + select-layout even-vertical
bind-key M select-layout main-horizontal
bind-key m select-layout main-vertical

# ペイン移動（vim準拠: sh/sj/sk/sl）
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# 新ウィンドウ（vim準拠: st）
bind-key t new-window -c "#{pane_current_path}"

# 左nvimへジャンプ（open_in_nvim_left）
# 使い方: prefix + p -> 出力から path/path:line/path:line:col を選択 -> 左nvimへジャンプ
bind-key p display-popup -E "$HOME/.local/bin/tmux_pick_path"
# 使い方: copy-mode -> 選択 -> Enter -> 左nvimへジャンプ
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "env TMUX_PANE_PATH='#{pane_current_path}' open_in_nvim_left"

set -g window-status-format '#I:#(pwd="#{pane_current_path}"; echo ${pwd####*/})#F'
set -g window-status-current-format '#I:#(pwd="#{pane_current_path}"; echo ${pwd####*/})#F'
set-option -g status-interval 1

set -s escape-time 0
set -g assume-paste-time 0

# プラグイン
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'fcsonline/tmux-thumbs'

# tmux-thumbs: 左nvimへジャンプ
# 使い方: prefix + T -> ヒント選択 -> 左nvimへジャンプ
set -g @thumbs-key T
set -g @thumbs-command 'TMUX_PANE_PATH="$(tmux display-message -p "#{pane_current_path}")" open_in_nvim_left "{}"'
set -g @thumbs-regexp-1 '([./~][^[:space:]:]+(:[0-9]+(:[0-9]+)?)?)'
set -g @thumbs-regexp-2 '([A-Za-z0-9_./~+-]+/[A-Za-z0-9_./~+.-]+(:[0-9]+(:[0-9]+)?)?)'
run-shell '~/.tmux/plugins/tpm/tpm'
