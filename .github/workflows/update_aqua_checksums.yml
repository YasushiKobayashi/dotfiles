name: update-aqua-checksums

on:
  pull_request:
    paths:
      - aqua.yaml
      - aqua-checksums.json

permissions:
  contents: write

jobs:
  update-checksum:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: aquaproj/aqua-installer@v3.0.1
        with:
          aqua_version: v2.30.0
      - uses: aquaproj/update-checksum-action@v0.2.6
        with:
          prune: "true"
          skip_push: "false"
          commit_message: "chore: update aqua checksums"
